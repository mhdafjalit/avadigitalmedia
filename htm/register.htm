<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>Welcome to :: Auva Digital Media</title>

<body class="login_bg">

<div class="container-xxl">

<div class="reg_box">
<div class="reg_box_inner">
<p class="text-center"><img src="images/auva.jpg" width="175" height="83" alt="Auva Digital Media"></p>
<p class="text-center mt-2 fs-5 text-black fw-medium">Create an account</p>

<div class="ps-4 pe-4">
<div class="row g-2 mt-1">
<div class="col-sm-6">
<div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="Name *"></div>
</div>
<div class="col-sm-6">
<div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="Mobile *"></div>
</div>
<div class="col-12">
<div class="reg_field"><input type="email" class="border-0 bg-transparent w-100" placeholder="Email Id *"></div>
</div>
<div class="col-sm-6">
<div class="reg_field"><input type="pawword" class="border-0 bg-transparent w-100" placeholder="Password *"></div>
</div>
<div class="col-sm-6">
<div class="reg_field"><input type="pawword" class="border-0 bg-transparent w-100" placeholder="Confirm Password *"></div>
</div>
</div>
</div>

<div class="p-4 mt-3" style="background:#fef5ff;">
<p class="fw-bold text-uppercase">Upload Documents</p>
<div class="row g-2 mt-1">
<div class="col-sm-6"><label class="mb-1 fw-medium fs-7">Aadhaar Card *</label><input type="file" class="form-control"></div>
<div class="col-sm-6"><label class="mb-1 fw-medium fs-7">PAN Card *</label><input type="file" class="form-control"></div>
<div class="col-sm-6"><label class="mb-1 fw-medium fs-7">Bank Passbook *</label><input type="file" class="form-control"></div>
</div>
</div>

<div class="p-4">
<p class="fw-bold text-uppercase">Bank Details</p>
<div class="row g-2 mt-1">
<div class="col-sm-6"><div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="Account Holder Name *"></div></div>
<div class="col-sm-6"><div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="Account No. *"></div></div>
<div class="col-sm-6"><div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="IFSC Code *"></div></div>
<div class="col-sm-6"><div class="reg_field"><input type="text" class="border-0 bg-transparent w-100" placeholder="Bank Name *"></div></div>
</div>
</div>

<div class="login_tab mt-1 text-center"><button type="submit" class="text-white rounded-5 fw-bold d-inline-block trans_eff" onClick="window.open('user/dashboard.htm','_parent')">Sign Up</button></div>

</div>
   
</div>
</div>

</div>

<p class="clearfix"></p>

</div>
